<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>묵호항 1박 2일 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ocean:#1a4a5c; --ocean-mid:#2a6b82; --ocean-light:#b8d8e4; --ocean-pale:#eaf4f8;
  --sand:#f5efe6; --sand-dark:#c8b49a;
  --coral:#d4614a; --coral-light:#f5cdc7;
  --sunrise:#f0a04a; --sunrise-light:#fde8ca;
  --ink:#1a2530; --muted:#6b7f8a; --border:#d6e8ef; --white:#fdfcfa;
  --serif:'Noto Serif KR',serif; --sans:'Noto Sans KR',sans-serif; --mono:'DM Mono',monospace;
  --card-bg:rgba(255,253,250,0.95);
}
body.dark-mode {
  --ocean:#b8d8e4; --ocean-mid:#4a8da8; --ocean-light:#1a4a5c; --ocean-pale:#102a35;
  --sand:#1f1911; --sand-dark:#4a3b2c;
  --coral:#f5cdc7; --coral-light:#d4614a;
  --sunrise:#fde8ca; --sunrise-light:#f0a04a;
  --ink:#fdfcfa; --muted:#a0b2bc; --border:#2a3f4d; --white:#121a21;
  --card-bg:rgba(18,26,33,0.95);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--white);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.6;transition:background 0.3s, color 0.3s;}
#app{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:480px 1fr;height:100vh;overflow:hidden;position:relative;}
@media(max-width:1024px){#app{grid-template-columns:1fr;grid-template-rows:auto 400px;height:auto;overflow:visible;}}
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow-y:auto;position:relative;z-index:10;transition:background 0.3s, border-color 0.3s;}
@media(max-width:1024px){.sidebar{height:auto;max-height:none;overflow-y:visible;}}
.header{padding:40px 32px 32px 32px;border-bottom:1px solid var(--ocean-pale);background:linear-gradient(to bottom, var(--ocean-pale) 0%, var(--white) 100%);position:relative;}
.header-meta{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--ocean-mid);margin-bottom:12px;font-weight:500;display:flex;align-items:center;gap:8px;}
.header-meta span::before{content:"•";margin-right:8px;color:var(--coral);}
h1{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--ocean);line-height:1.25;letter-spacing:-0.5px;}
.subtitle{font-size:14px;color:var(--muted);margin-top:8px;font-weight:300;}

/* 상단 우측 기능 버튼 레이아웃 */
.header-controls { position:absolute; top:40px; right:32px; display:flex; gap:8px; }
.btn-control {
  background:var(--ocean-pale); border:1px solid var(--border); color:var(--ocean-mid); 
  padding:8px 14px; border-radius:20px; font-size:12px; cursor:pointer; font-family:var(--sans); 
  font-weight:500; transition:all 0.2s ease; display:flex; align-items:center; gap:4px;
}
.btn-control:hover { background:var(--ocean-light); color:var(--white); }
#editBtn.editing { background:var(--coral); color:var(--white); border-color:var(--coral); }

.timeline{padding:24px 32px 40px 32px;flex:1;}
.day-section{margin-bottom:40px;position:relative;}
.day-section:last-child{margin-bottom:0;}
.day-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ocean);padding-bottom:12px;margin-bottom:20px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:8px;}
.day-title .date{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:400;}
.timeline-items{position:relative;padding-left:24px;}
.timeline-items::before{content:"";position:absolute;left:4px;top:8px;bottom:8px;width:1px;background:var(--border);}
.item{position:relative;margin-bottom:28px;}
.item:last-child{margin-bottom:0;}
.item-dot{position:absolute;left:-24px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--white);border:2px solid var(--ocean-mid);transition:all 0.3s ease;z-index:2;}
.item:hover .item-dot{background:var(--coral);border-color:var(--coral);transform:scale(1.2);}

/* 편집 모드 전용 인라인 스타일 */
.editable-field { border-radius:3px; transition:all 0.2s; }
body.edit-mode .editable-field { background:var(--ocean-pale); box-shadow:0 0 0 2px var(--ocean-pale); min-height:1.2em; }
body.edit-mode .editable-field:focus { background:var(--white); box-shadow:0 0 0 2px var(--coral); color:var(--ink); outline:none; }

/* 주소 입력을 위한 숨겨진/보여지는 필드 구성 */
.address-field { display:none; font-size:11px; color:var(--ocean-mid); margin-top:4px; font-family:var(--sans); width:100%; border:none; background:transparent; }
body.edit-mode .address-field { display:block; border-bottom:1px dashed var(--border); padding:2px 0; }
body.edit-mode .address-field:focus { outline:none; border-bottom-color:var(--coral); }

/* 일정 추가 버튼 */
.add-item-container { display:none; margin-top:16px; padding-left:24px; }
body.edit-mode .add-item-container { display:block; }
.btn-add { background:transparent; border:1px dashed var(--ocean-mid); color:var(--ocean-mid); padding:8px; width:100%; border-radius:6px; font-size:13px; cursor:pointer; font-weight:500; }
.btn-add:hover { background:var(--ocean-pale); }

.item-time{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--coral);line-height:1;margin-bottom:4px;display:inline-block;}
.item-title{font-size:15px;font-weight:500;color:var(--ink);line-height:1.4;}
.item-desc{font-size:13px;color:var(--muted);margin-top:4px;font-weight:300;line-height:1.5;}
.item-tag-select { display:none; margin-top:6px; font-size:11px; padding:2px; border-radius:4px; background:var(--white); color:var(--ink); border:1px solid var(--border); }
body.edit-mode .item-tag-select { display:inline-block; }
body.edit-mode .item-tag { display:none; }

.item-tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;margin-top:6px;text-transform:uppercase;letter-spacing:0.5px;}
.tag-food{background:var(--sunrise-light);color:var(--sunrise);}
.tag-stay{background:var(--coral-light);color:var(--coral);}
.tag-spot{background:var(--ocean-pale);color:var(--ocean-mid);}
.tag-none{display:none;}

.map-container{position:relative;width:100%;height:100%;background:var(--sand);}
@media(max-width:1024px){.map-container{height:400px;}}
#naverMap{width:100%;height:100%;}
.map-overlay-card{position:absolute;bottom:24px;right:24px;background:var(--card-bg);padding:16px 20px;border-radius:8px;box-shadow:0 12px 32px rgba(26,37,48,0.08);backdrop-filter:blur(8px);border:1px solid rgba(214,232,239,0.5);z-index:20;max-width:320px;pointer-events:auto;transition:background 0.3s;}
.overlay-title{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--ocean);margin-bottom:4px;}
.overlay-desc{font-size:12px;color:var(--muted);line-height:1.4;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--ocean-pale);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--border);}
</style>
</head>
<body>

<div id="app">
  <div class="sidebar">
    <div class="header">
      <div class="header-meta">1박 2일 여행<span>Mukho Trip</span></div>
      <h1 class="editable-field">푸른 바다와<br>유산의 도시, 동해</h1>
      <div class="subtitle editable-field">묵호항 중심의 감성 여행 코스 가이드</div>
      
      <div class="header-controls">
        <button class="btn-control" id="editBtn">편집 모드</button>
        <button class="btn-control" id="themeBtn">야간 모드</button>
      </div>
    </div>

    <div class="timeline">
      <div class="day-section" id="day1Section">
        <div class="day-title">Day 01 <span class="date editable-field">바다와 감성의 시작</span></div>
        <div class="timeline-items" id="day1Items">
          </div>
        <div class="add-item-container">
          <button class="btn-add" onclick="addNewItem('day1')">+ 새로운 일정 추가 (Day 1)</button>
        </div>
      </div>

      <div class="day-section" id="day2Section">
        <div class="day-title">Day 02 <span class="date editable-field">자연의 신비와 여운</span></div>
        <div class="timeline-items" id="day2Items">
          </div>
        <div class="add-item-container">
          <button class="btn-add" onclick="addNewItem('day2')">+ 새로운 일정 추가 (Day 2)</button>
        </div>
      </div>
    </div>
  </div>

  <div class="map-container">
    <div id="naverMap"></div>
    <div class="map-overlay-card">
      <div class="overlay-title editable-field">동선 가이드</div>
      <div class="overlay-desc editable-field">묵호항의 핵심 감성 스폿부터 편안한 숙소, 삼척의 명소까지 이어지는 최적의 루트입니다.</div>
    </div>
  </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=554f46e78eae0af969d1c18e06539ce3&libraries=services"></script>
