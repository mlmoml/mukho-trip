<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>묵호항 1박 2일 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ocean:#1a4a5c; --ocean-mid:#2a6b82; --ocean-light:#b8d8e4; --ocean-pale:#eaf4f8;
  --sand:#f5efe6; --sand-dark:#c8b49a;
  --coral:#d4614a; --coral-light:#f5cdc7;
  --sunrise:#f0a04a; --sunrise-light:#fde8ca;
  --ink:#1a2530; --muted:#6b7f8a; --border:#d6e8ef; --white:#fdfcfa;
  --serif:'Noto Serif KR',serif; --sans:'Noto Sans KR',sans-serif; --mono:'DM Mono',monospace;
  --card-bg:rgba(255,253,250,0.95);
}
body.dark-mode {
  --ocean:#b8d8e4; --ocean-mid:#4a8da8; --ocean-light:#1a4a5c; --ocean-pale:#102a35;
  --sand:#1f1911; --sand-dark:#4a3b2c;
  --coral:#f5cdc7; --coral-light:#d4614a;
  --sunrise:#fde8ca; --sunrise-light:#f0a04a;
  --ink:#fdfcfa; --muted:#a0b2bc; --border:#2a3f4d; --white:#121a21;
  --card-bg:rgba(18,26,33,0.95);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--white);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.6;transition:background 0.3s, color 0.3s;}
#app{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:480px 1fr;height:100vh;overflow:hidden;position:relative;}
@media(max-width:1024px){#app{grid-template-columns:1fr;grid-template-rows:auto 400px;height:auto;overflow:visible;}}
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow-y:auto;position:relative;z-index:10;transition:background 0.3s, border-color 0.3s;}
@media(max-width:1024px){.sidebar{height:auto;max-height:none;overflow-y:visible;}}
.header{padding:40px 32px 32px 32px;border-bottom:1px solid var(--ocean-pale);background:linear-gradient(to bottom, var(--ocean-pale) 0%, var(--white) 100%);position:relative;}
.header-meta{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--ocean-mid);margin-bottom:12px;font-weight:500;display:flex;align-items:center;gap:8px;}
.header-meta span::before{content:"•";margin-right:8px;color:var(--coral);}
h1{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--ocean);line-height:1.25;letter-spacing:-0.5px;}
.subtitle{font-size:14px;color:var(--muted);margin-top:8px;font-weight:300;}

.header-controls { position:absolute; top:40px; right:32px; display:flex; gap:8px; }
.btn-control {
  background:var(--ocean-pale); border:1px solid var(--border); color:var(--ocean-mid); 
  padding:8px 14px; border-radius:20px; font-size:12px; cursor:pointer; font-family:var(--sans); 
  font-weight:500; transition:all 0.2s ease; display:flex; align-items:center; gap:4px;
}
.btn-control:hover { background:var(--ocean-light); color:var(--white); }
#editBtn.editing { background:var(--coral); color:var(--white); border-color:var(--coral); }

.timeline{padding:24px 32px 40px 32px;flex:1;}
.day-section{margin-bottom:40px;position:relative;}
.day-section:last-child{margin-bottom:0;}
.day-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ocean);padding-bottom:12px;margin-bottom:20px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:8px;}
.day-title .date{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:400;}
.timeline-items{position:relative;padding-left:24px;}
.timeline-items::before{content:"";position:absolute;left:4px;top:8px;bottom:8px;width:1px;background:var(--border);}

.item{position:relative;margin-bottom:28px;padding:8px;border-radius:6px;cursor:pointer;transition:background 0.2s ease;}
.item:hover{background:var(--ocean-pale);}
body.edit-mode .item{cursor:default;}
body.edit-mode .item:hover{background:transparent;}

.item-dot{position:absolute;left:-24px;top:14px;width:9px;height:9px;border-radius:50%;background:var(--white);border:2px solid var(--ocean-mid);transition:all 0.3s ease;z-index:2;}
.item:hover .item-dot{background:var(--coral);border-color:var(--coral);transform:scale(1.2);}

.editable-field { border-radius:3px; transition:all 0.2s; }
body.edit-mode .editable-field { background:var(--white); box-shadow:0 0 0 2px var(--border); min-height:1.2em; }
body.edit-mode .editable-field:focus { background:var(--white); box-shadow:0 0 0 2px var(--coral); color:var(--ink); outline:none; }

.address-field { display:none; font-size:11px; color:var(--ocean-mid); margin-top:4px; font-family:var(--sans); width:100%; border:none; background:transparent; }
body.edit-mode .address-field { display:block; border-bottom:1px dashed var(--border); padding:2px 0; }
body.edit-mode .address-field:focus { outline:none; border-bottom-color:var(--coral); }

.add-item-container { display:none; margin-top:16px; padding-left:24px; }
body.edit-mode .add-item-container { display:block; }
.btn-add { background:transparent; border:1px dashed var(--ocean-mid); color:var(--ocean-mid); padding:8px; width:100%; border-radius:6px; font-size:13px; cursor:pointer; font-weight:500; }
.btn-add:hover { background:var(--ocean-pale); }

.btn-delete { display:none; position:absolute; top:12px; right:8px; background:transparent; border:none; color:var(--muted); font-size:11px; cursor:pointer; }
body.edit-mode .btn-delete { display:block; }
body.edit-mode .btn-delete:hover { color:var(--coral); }

.item-time{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--coral);line-height:1;margin-bottom:4px;display:inline-block;}
.item-title{font-size:15px;font-weight:500;color:var(--ink);line-height:1.4;padding-right:30px;}
.item-desc{font-size:13px;color:var(--muted);margin-top:4px;font-weight:300;line-height:1.5;}

.btn-map-link { display: inline-block; font-size: 11px; background: #fee500; color: #181c24; padding: 3px 8px; border-radius: 4px; font-weight: 500; margin-top: 6px; text-decoration: none; border: 1px solid #e1cb00; transition: background 0.2s; }
.btn-map-link:hover { background: #fada00; }
.btn-map-link + .btn-map-link { margin-left: 4px; }
.btn-map-link.alt { background: var(--ocean-pale); color: var(--ocean-mid); border-color: var(--border); }
.btn-map-link.alt:hover { background: var(--ocean-light); color: var(--white); }
body.edit-mode .btn-map-link { display: none; }

.map-controls { position:absolute; top:16px; left:16px; background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; box-shadow:0 4px 16px rgba(26,37,48,0.08); backdrop-filter:blur(8px); z-index:20; display:flex; flex-direction:column; gap:6px; font-size:12px; transition:background 0.3s; }
.map-controls-title { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--ocean-mid); font-weight:500; margin-bottom:2px; }
.map-controls label { display:flex; align-items:center; gap:6px; color:var(--ink); cursor:pointer; user-select:none; font-size:12px; }
.map-controls input[type="checkbox"] { accent-color:var(--ocean-mid); cursor:pointer; }
.map-controls-divider { height:1px; background:var(--border); margin:4px 0; }
.btn-skyview { background:var(--ocean-pale); border:1px solid var(--border); color:var(--ocean-mid); padding:4px 8px; border-radius:4px; font-size:11px; cursor:pointer; font-family:var(--sans); font-weight:500; transition:all 0.2s; }
.btn-skyview:hover { background:var(--ocean-light); color:var(--white); }
.btn-skyview.active { background:var(--coral); color:var(--white); border-color:var(--coral); }

.item-tag-select { display:none; margin-top:6px; font-size:11px; padding:2px; border-radius:4px; background:var(--white); color:var(--ink); border:1px solid var(--border); }
body.edit-mode .item-tag-select { display:inline-block; }
body.edit-mode .item-tag { display:none; }

.item-tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;margin-top:6px;text-transform:uppercase;letter-spacing:0.5px;}
.tag-food{background:var(--sunrise-light);color:var(--sunrise);}
.tag-stay{background:var(--coral-light);color:var(--coral);}
.tag-spot{background:var(--ocean-pale);color:var(--ocean-mid);}
.tag-none{display:none;}

.map-container{position:relative;width:100%;height:100%;background:var(--sand);}
@media(max-width:1024px){.map-container{height:400px;}}
#naverMap{width:100%;height:100%;}
.map-overlay-card{position:absolute;bottom:24px;right:24px;background:var(--card-bg);padding:16px 20px;border-radius:8px;box-shadow:0 12px 32px rgba(26,37,48,0.08);backdrop-filter:blur(8px);border:1px solid rgba(214,232,239,0.5);z-index:20;max-width:320px;pointer-events:auto;transition:background 0.3s;}
.overlay-title{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--ocean);margin-bottom:4px;}
.overlay-desc{font-size:12px;color:var(--muted);line-height:1.4;}
.place-card { position:relative; width:300px; background:var(--white); border-radius:12px; box-shadow:0 12px 36px rgba(0,0,0,0.18); font-family:var(--sans); overflow:visible; margin-bottom:12px; color:var(--ink); }
.place-card::after { content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent; border-top:9px solid var(--white); }
.pc-header { display:flex; align-items:flex-start; justify-content:space-between; padding:14px 16px 6px; gap:8px; }
.pc-name-wrap { flex:1; min-width:0; }
.pc-name { font-size:15px; font-weight:600; line-height:1.3; color:var(--ink); }
.pc-cat { font-size:11px; color:var(--ocean-mid); margin-top:3px; font-weight:500; }
.pc-close { background:transparent; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:0; line-height:1; flex-shrink:0; }
.pc-close:hover { color:var(--ink); }
.pc-body { padding:0 16px 12px; font-size:12px; color:var(--muted); line-height:1.5; }
.pc-addr { display:flex; gap:6px; align-items:flex-start; }
.pc-addr-label { color:var(--ocean-mid); font-weight:500; flex-shrink:0; }
.pc-phone { color:var(--coral); font-weight:500; margin-top:4px; font-family:var(--mono); }
.pc-actions { display:flex; border-top:1px solid var(--border); }
.pc-actions a { flex:1; padding:10px 4px; text-align:center; font-size:11px; color:var(--ocean-mid); text-decoration:none; font-weight:500; border-right:1px solid var(--border); transition:background 0.15s; }
.pc-actions a:last-child { border-right:none; border-bottom-right-radius:12px; }
.pc-actions a:first-child { border-bottom-left-radius:12px; }
.pc-actions a:hover { background:var(--ocean-pale); }
.pc-actions a.primary { background:var(--ocean-mid); color:#fff; font-weight:600; }
.pc-actions a.primary:hover { background:var(--ocean); color:#fff; }

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--ocean-pale);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--border);}
</style>
</head>
<body>

<div id="app">
  <div class="sidebar">
    <div class="header">
      <div class="header-meta">1박 2일 여행<span>Mukho Trip</span></div>
      <h1 class="editable-field" id="mainTitle">로딩 중...</h1>
      <div class="subtitle editable-field" id="mainSubtitle">데이터를 불러오는 중입니다.</div>
      
      <div class="header-controls">
        <button class="btn-control" id="editBtn">편집 모드</button>
        <button class="btn-control" id="themeBtn">야간 모드</button>

    </div>

    <div class="timeline">
      <div class="day-section" id="day1Section">

  </div>

  <div class="map-container">
    <div id="naverMap"></div>

    <div class="map-controls">
      <div class="map-controls-title">Map Layers</div>

      <button class="btn-skyview" id="btnSkyview" type="button">스카이뷰 전환</button>
    </div>

    <div class="map-overlay-card">
      <div class="overlay-title editable-field" id="overlayTitle">동선 가이드</div>
      <div class="overlay-desc editable-field" id="overlayDesc">가이드 정보 로딩 중...</div>
    </div>
  </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=554f46e78eae0af969d1c18e06539ce3&libraries=services"></script>

let textMetaData = {};
let initialTimelineData = [];
let map, geocoder, places, polyline;
let markers = [];
let infowindows = [];
let isEditMode = false;
let markerMap = {};

async function loadDataFromServer() {
  try {
    const response = await fetch(DB_URL);
    const serverData = await response.json();
    
    if(serverData && serverData.schedule && serverData.schedule.length > 0) {
      textMetaData = serverData.meta;
      initialTimelineData = serverData.schedule;
    } else {
      textMetaData = defaultMeta;
      initialTimelineData = defaultSchedule;
    }
    renderTextMetaUI();
    renderTimelineUI();
    updateMapEngine();
  } catch (error) {
    console.error("서버 연결 실패, 기본 데이터 로드:", error);
    textMetaData = defaultMeta;
    initialTimelineData = defaultSchedule;
    renderTextMetaUI();
    renderTimelineUI();
    updateMapEngine();
  }
}

async function saveDataToServer() {
  try {
    await fetch(DB_URL, {
      method: "PUT",
      body: JSON.stringify({
        meta: textMetaData,
        schedule: initialTimelineData
      })
    });
    alert("공용 데이터베이스 동기화 완료! 링크를 연 모든 일행의 화면이 업데이트되었습니다.");
  } catch (error) {
    alert("데이터베이스 저장 처리에 실패했습니다.");
  }
}

function renderTextMetaUI() {
  document.getElementById('mainTitle').innerHTML = textMetaData.mainTitle || '';
  document.getElementById('mainSubtitle').innerText = textMetaData.mainSubtitle || '';
  document.getElementById('day1Title').innerText = textMetaData.day1Title || '';
  document.getElementById('day2Title').innerText = textMetaData.day2Title || '';
  document.getElementById('overlayTitle').innerText = textMetaData.overlayTitle || '';
  document.getElementById('overlayDesc').innerText = textMetaData.overlayDesc || '';
}

function renderTimelineUI() {
  const day1Container = document.getElementById('day1Items');
  const day2Container = document.getElementById('day2Items');
  day1Container.innerHTML = '';
  day2Container.innerHTML = '';

  initialTimelineData.forEach(item => {
    const hasAddress = item.address && item.address.trim() !== '';
    const kakaoMapSearchUrl = hasAddress ? `https://map.kakao.com/link/search/${encodeURIComponent(item.address)}` : '#';
    const cachedCoords = markerMap[item.id] ? markerMap[item.id].coords : null;
    const lat = cachedCoords ? cachedCoords.getLat() : null;
    const lng = cachedCoords ? cachedCoords.getLng() : null;
    const kakaoRouteUrl = (lat && lng) ? `https://map.kakao.com/link/to/${encodeURIComponent(item.title)},${lat},${lng}` : null;
    const kakaoRoadviewUrl = (lat && lng) ? `https://map.kakao.com/link/roadview/${lat},${lng}` : null;

    const itemHTML = `
      <div class="item" data-id="${item.id}" onclick="focusMapLocation('${item.id}')">
        <div class="item-dot"></div>
        <div class="item-time editable-field" contenteditable="${isEditMode}">${item.time}</div>
        <div class="item-title editable-field" contenteditable="${isEditMode}">${item.title}</div>
        <div class="item-desc editable-field" contenteditable="${isEditMode}">${item.desc}</div>
        <button class="btn-delete" onclick="event.stopPropagation(); deleteItem('${item.id}')">삭제</button>
        <input type="text" class="address-field" placeholder="정확한 도로명 주소 입력" value="${item.address || ''}" onclick="event.stopPropagation();">
        <div>
          <span class="item-tag tag-${item.tag}">${item.tag === 'none' ? '' : item.tag.toUpperCase()}</span>
          ${hasAddress ? `<a href="${kakaoMapSearchUrl}" target="_blank" class="btn-map-link" onclick="event.stopPropagation();">상세 보기 ↗</a>` : ''}
          ${kakaoRouteUrl ? `<a href="${kakaoRouteUrl}" target="_blank" class="btn-map-link alt" onclick="event.stopPropagation();">길찾기 ↗</a>` : ''}
          ${kakaoRoadviewUrl ? `<a href="${kakaoRoadviewUrl}" target="_blank" class="btn-map-link alt" onclick="event.stopPropagation();">로드뷰 ↗</a>` : ''}
        </div>
        <select class="item-tag-select" onclick="event.stopPropagation();">
          <option value="none" ${item.tag === 'none' ? 'selected' : ''}>태그 없음</option>
          <option value="spot" ${item.tag === 'spot' ? 'selected' : ''}>SPOT</option>
          <option value="food" ${item.tag === 'food' ? 'selected' : ''}>CAFE/FOOD</option>
          <option value="stay" ${item.tag === 'stay' ? 'selected' : ''}>STAY</option>
        </select>
      </div>
    `;
    if (item.day === 'day1') day1Container.insertAdjacentHTML('beforeend', itemHTML);
    else day2Container.insertAdjacentHTML('beforeend', itemHTML);
  });
}

function focusMapLocation(itemId) {
  if (isEditMode) return;
  openPlaceCard(itemId);
}

function addNewItem(day) {
  const newId = 'item_' + Date.now();
  initialTimelineData.push({ id: newId, day: day, time: '12:00', title: '새 일정 명칭', desc: '설명을 입력해 주세요.', tag: 'none', address: '' });
  renderTimelineUI();
}

function deleteItem(id) {
  initialTimelineData = initialTimelineData.filter(d => d.id !== id);
  renderTimelineUI();
}

const editBtn = document.getElementById('editBtn');
editBtn.addEventListener('click', async () => {
  if (!isEditMode) {
    const userInput = prompt("편집을 시작하려면 암호를 입력해 주세요:");
    if (userInput !== EDIT_PASSWORD) {
      alert("암호가 일치하지 않아 편집 모드를 활성화할 수 없습니다.");
      return;
    }
  }

  isEditMode = !isEditMode;
  
  if (isEditMode) {
    document.body.classList.add('edit-mode');
    editBtn.textContent = '저장 하기';
    editBtn.classList.add('editing');
    document.querySelectorAll('.editable-field').forEach(el => el.setAttribute('contenteditable', 'true'));
    renderTimelineUI(); 
  } else {
    document.body.classList.remove('edit-mode');
    editBtn.textContent = '편집 모드';
    editBtn.classList.remove('editing');
    document.querySelectorAll('.editable-field').forEach(el => el.setAttribute('contenteditable', 'false'));

    textMetaData.mainTitle = document.getElementById('mainTitle').innerHTML;
    textMetaData.mainSubtitle = document.getElementById('mainSubtitle').innerText;
    textMetaData.day1Title = document.getElementById('day1Title').innerText;
    textMetaData.day2Title = document.getElementById('day2Title').innerText;
    textMetaData.overlayTitle = document.getElementById('overlayTitle').innerText;
    textMetaData.overlayDesc = document.getElementById('overlayDesc').innerText;

    document.querySelectorAll('.timeline-items .item').forEach(itemEl => {
      const id = itemEl.getAttribute('data-id');
      const time = itemEl.querySelector('.item-time').innerText.trim();
      const title = itemEl.querySelector('.item-title').innerText.trim();
      const desc = itemEl.querySelector('.item-desc').innerText.trim();
      const address = itemEl.querySelector('.address-field').value.trim();
      const tag = itemEl.querySelector('.item-tag-select').value;

      const dataObj = initialTimelineData.find(d => d.id === id);
      if (dataObj) {
        dataObj.time = time;
        dataObj.title = title;
        dataObj.desc = desc;
        dataObj.address = address;
        dataObj.tag = tag;
      }
    });

    renderTextMetaUI();
    renderTimelineUI();
    updateMapEngine();

    await saveDataToServer();
  }
});

const themeBtn = document.getElementById('themeBtn');
themeBtn.addEventListener('click', () => {
  document.body.classList.toggle('dark-mode');
  themeBtn.textContent = document.body.classList.contains('dark-mode') ? '주간 모드' : '야간 모드';
  if (!isEditMode) updateMapEngine();
});

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function closeAllOverlays() {
  Object.values(markerMap).forEach(m => { if (m.overlay) m.overlay.setMap(null); });
}

function buildPlaceCardHTML(loc, placeData, lat, lng) {
  const name = escapeHtml(loc.title);
  const category = placeData && placeData.category_name ? escapeHtml(placeData.category_name.split('>').pop().trim()) : '';
  const roadAddr = placeData && placeData.road_address_name ? escapeHtml(placeData.road_address_name) : '';
  const jibunAddr = escapeHtml(loc.address || (placeData && placeData.address_name) || '');
  const phone = placeData && placeData.phone ? escapeHtml(placeData.phone) : '';
  const placeUrl = placeData && placeData.place_url ? placeData.place_url : `https://map.kakao.com/link/search/${encodeURIComponent(loc.address || loc.title)}`;
  const routeUrl = `https://map.kakao.com/link/to/${encodeURIComponent(loc.title)},${lat},${lng}`;
  const roadviewUrl = `https://map.kakao.com/link/roadview/${lat},${lng}`;

  return `
    <div class="place-card">
      <div class="pc-header">
        <div class="pc-name-wrap">
          <div class="pc-name">${name}</div>
          ${category ? `<div class="pc-cat">${category}</div>` : ''}
        </div>
        <button class="pc-close" type="button" onclick="closeAllOverlays()">×</button>
      </div>
      <div class="pc-body">
        ${roadAddr ? `<div class="pc-addr"><span class="pc-addr-label">도로명</span><span>${roadAddr}</span></div>` : ''}
        ${jibunAddr ? `<div class="pc-addr"><span class="pc-addr-label">${roadAddr ? '지번' : '주소'}</span><span>${jibunAddr}</span></div>` : ''}
        ${phone ? `<div class="pc-phone">${phone}</div>` : ''}
      </div>
      <div class="pc-actions">
        <a href="${placeUrl}" target="_blank">상세보기</a>
        <a href="${roadviewUrl}" target="_blank">로드뷰</a>
        <a href="${routeUrl}" target="_blank" class="primary">길찾기</a>
      </div>
    </div>
  `;
}

function openPlaceCard(itemId) {
  const entry = markerMap[itemId];
  if (!entry) return;
  closeAllOverlays();
  entry.overlay.setMap(map);
  map.panTo(entry.coords);
}

function updateMapEngine() {
  if (typeof kakao === 'undefined' || !kakao.maps || !kakao.maps.services) return;
  markers.forEach(m => m.setMap(null));
  closeAllOverlays();
  if (polyline) polyline.setMap(null);

  markers = [];
  infowindows = [];
  markerMap = {};

  const validLocations = initialTimelineData.filter(loc => loc.address && loc.address.trim() !== '');
  if (validLocations.length === 0) return;

  const bounds = new kakao.maps.LatLngBounds();
  const positionsWithOrder = new Array(validLocations.length);
  let processedCount = 0;

  validLocations.forEach((loc, index) => {
    geocoder.addressSearch(loc.address, function(result, status) {
      if (status === kakao.maps.services.Status.OK) {
        const lat = result[0].y;
        const lng = result[0].x;
        const coords = new kakao.maps.LatLng(lat, lng);
        positionsWithOrder[index] = coords;

        const marker = new kakao.maps.Marker({ map: map, position: coords });
        markers.push(marker);

        const overlay = new kakao.maps.CustomOverlay({
          position: coords,
          content: buildPlaceCardHTML(loc, null, lat, lng),
          xAnchor: 0.5,
          yAnchor: 1,
          zIndex: 100
        });

        markerMap[loc.id] = { marker, overlay, coords, placeData: null };

        kakao.maps.event.addListener(marker, 'click', function() {
          openPlaceCard(loc.id);
        });

        places.keywordSearch(loc.title, function(data, pStatus) {
          if (pStatus !== kakao.maps.services.Status.OK || !data || data.length === 0) return;
          let closest = data[0];
          let closestDist = Math.hypot(parseFloat(data[0].y) - parseFloat(lat), parseFloat(data[0].x) - parseFloat(lng));
          for (let i = 1; i < data.length; i++) {
            const d = Math.hypot(parseFloat(data[i].y) - parseFloat(lat), parseFloat(data[i].x) - parseFloat(lng));
            if (d < closestDist) { closest = data[i]; closestDist = d; }
          }
          if (closestDist < 0.005) {
            markerMap[loc.id].placeData = closest;
            overlay.setContent(buildPlaceCardHTML(loc, closest, lat, lng));
          }
        });

        bounds.extend(coords);
      }
      processedCount++;
      if (processedCount === validLocations.length) {
        const validPath = positionsWithOrder.filter(p => p !== undefined);
        if (validPath.length > 0) {
          polyline = new kakao.maps.Polyline({
            map: map,
            path: validPath,
            strokeWeight: 3,
            strokeColor: document.body.classList.contains('dark-mode') ? '#4a8da8' : '#2a6b82',
            strokeOpacity: 0.7,
            strokeStyle: 'solid'
          });
        }
        map.setBounds(bounds);
        if (!isEditMode) renderTimelineUI();
      }
    });
  });
}

function setupMapControls() {
  const zoomControl = new kakao.maps.ZoomControl();
  map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

  const mapTypeControl = new kakao.maps.MapTypeControl();
  map.addControl(mapTypeControl, kakao.maps.ControlPosition.TOPRIGHT);

  map.setKeyboardShortcuts(true);

  const overlayTypes = {
    chkTraffic: kakao.maps.MapTypeId.TRAFFIC,
    chkBicycle: kakao.maps.MapTypeId.BICYCLE,
    chkTerrain: kakao.maps.MapTypeId.TERRAIN,
    chkRoadview: kakao.maps.MapTypeId.ROADVIEW
  };

  Object.entries(overlayTypes).forEach(([id, typeId]) => {
    document.getElementById(id).addEventListener('change', (e) => {
      if (e.target.checked) map.addOverlayMapTypeId(typeId);
      else map.removeOverlayMapTypeId(typeId);
    });
  });

  const skyviewBtn = document.getElementById('btnSkyview');
  skyviewBtn.addEventListener('click', () => {
    const isSkyview = skyviewBtn.classList.toggle('active');
    map.setMapTypeId(isSkyview ? kakao.maps.MapTypeId.HYBRID : kakao.maps.MapTypeId.ROADMAP);
    skyviewBtn.textContent = isSkyview ? '일반지도 전환' : '스카이뷰 전환';
  });
}

window.addEventListener('load', () => {
  const container = document.getElementById('naverMap');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.53, 129.13),
    level: 8,
    mapTypeId: kakao.maps.MapTypeId.ROADMAP
  });
  geocoder = new kakao.maps.services.Geocoder();
  places = new kakao.maps.services.Places();
  setupMapControls();
  kakao.maps.event.addListener(map, 'click', closeAllOverlays);
  loadDataFromServer();
});
</script>
